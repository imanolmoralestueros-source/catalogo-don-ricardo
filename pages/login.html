<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" href="../assets/img/logo.svg">
    <link rel="stylesheet" href="../assets/css/base.css">
    <link rel="stylesheet" href="../assets/css/login.css">

    <title>Acceso — Agricola Don Ricardo</title>
</head>

<body>

    <main class="loginPage">
        <div class="loginCard">

            <div class="loginCard__brand">
                <img src="../assets/img/logo.svg" alt="Agricola Don Ricardo">
            </div>

            <h1>Iniciar sesión</h1>
            <p class="loginCard__subtitle">Acceso al catálogo de productos</p>

            <div class="formGroup">
                <label for="user">Usuario</label>
                <input type="text" id="user" autocomplete="username">
            </div>

            <div class="formGroup">
                <label for="password">Contraseña</label>
                <input type="password" id="password" autocomplete="current-password">
            </div>

            <button id="login" class="loginBtn">Ingresar</button>

            <p id="wrongMessage" aria-live="polite"></p>

            <div class="demoHint">
                Credenciales de prueba:<br>
                usuario <b>SoyGuardian</b> &middot; contraseña <b>iocarry</b>
            </div>

        </div>
    </main>

    <script src="../scripts/login.js" type="module"></script>

</body>

</html>
